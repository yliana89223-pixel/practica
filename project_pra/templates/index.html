<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет самокатов около метро</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <span class="header-icon"></span>
        <h1>Учет самокатов у метро</h1>
    </div>
    <div class="subtitle">
        Загрузите фото — ИИ подсчитает количество самокатов
    </div>
    <div class="upload-area" id="uploadArea">
        <div class="file-input-wrapper">
            <label class="file-input-label" for="fileInput">
                <span>Выберите изображение</span>
            </label>
            <input type="file" id="fileInput" accept="image/*" />
            <div id="fileName">Файл не выбран</div>
        </div>
        <button class="btn-process" id="processBtn" disabled>
            <span class="btn-text">Запустить обработку</span>
            <span class="spinner"></span>
        </button>
    </div>
    <div id="result">
        <div class="result-card">
            <div class="stats-bar">
                <div class="count-badge">
                    <span class="count-number" id="countDisplay">0</span>
                    <span class="count-label">объектов обнаружено</span>
                </div>
                <span class="timestamp" id="timestampDisplay">—</span>
            </div>
            <div class="image-wrapper">
                <img id="resultImage" src="" alt="Результат обработки" style="display:none;" />
                <span class="placeholder-text" id="placeholderText">Результат появится здесь</span>
            </div>
        </div>
        <div class="history-link">
            <a href="/history" target="_blank">История запросов</a>
        </div>
    </div>
</div>
<script src="/static/script.js"></script>
</body>
</html>
